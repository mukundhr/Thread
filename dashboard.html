<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Thread</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:       #F7F6F3;
  --surface:  #FFFFFF;
  --border:   #E4E1D9;
  --border2:  #D0CCc4;
  --ink:      #18181B;
  --ink2:     #52525B;
  --ink3:     #A1A1AA;
  --blue:     #1D4ED8;
  --blue-bg:  #EFF6FF;
  --green:    #15803D;
  --green-bg: #F0FDF4;
  --red:      #B91C1C;
  --red-bg:   #FEF2F2;
  --amber:    #B45309;
  --amber-bg: #FFFBEB;
  --display:  'Fraunces', serif;
  --sans:     'DM Sans', sans-serif;
  --mono:     'JetBrains Mono', monospace;
  --r:        10px;
  --shadow:   0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.04);
}

html,body,#root{height:100%;font-family:var(--sans);background:var(--bg);color:var(--ink);}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── Layout ── */
.app{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ── */
.sidebar{
  width:232px;min-width:232px;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sidebar-top{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.brand-mark{
  width:28px;height:28px;background:var(--ink);border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-family:var(--display);font-size:.85rem;font-weight:600;
  letter-spacing:-.02em;flex-shrink:0
}
.brand-name{font-family:var(--display);font-size:1.05rem;font-weight:600;letter-spacing:-.02em}
.field-label{font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;font-family:var(--mono)}
.sidebar-select{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:7px;padding:7px 10px;font-family:var(--sans);
  font-size:.8rem;color:var(--ink);cursor:pointer;outline:none;
  appearance:none;
}
.sidebar-select:focus{border-color:var(--blue)}
.sidebar-select option{background:var(--surface)}
.field-group{margin-bottom:10px}

.nav{flex:1;overflow-y:auto;padding:10px 8px}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:8px;cursor:pointer;
  font-size:.83rem;font-weight:500;color:var(--ink2);
  transition:all .12s;border:1px solid transparent;margin-bottom:2px;
}
.nav-item:hover{background:var(--bg);color:var(--ink)}
.nav-item.active{background:var(--ink);color:#fff}
.nav-icon{font-size:.85rem;width:16px;text-align:center;flex-shrink:0}

.new-btn{
  margin:10px;padding:11px;background:var(--blue);color:#fff;
  border:none;border-radius:8px;font-family:var(--sans);font-weight:600;
  font-size:.82rem;cursor:pointer;transition:opacity .15s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.new-btn:hover{opacity:.88}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

.topbar{
  height:52px;min-height:52px;
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 28px;gap:12px;
}
.topbar-topic{font-family:var(--display);font-size:1rem;font-weight:600;letter-spacing:-.02em}
.topbar-chip{
  font-family:var(--mono);font-size:.68rem;padding:3px 8px;
  border-radius:20px;background:var(--bg);border:1px solid var(--border);color:var(--ink2);
}

.content{flex:1;overflow-y:auto;padding:28px 32px}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px 24px;margin-bottom:14px;box-shadow:var(--shadow)}

/* ── Final View Hero ── */
.hero{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:32px 36px;margin-bottom:24px;
  box-shadow:var(--shadow-md);position:relative;overflow:hidden;
}
.hero::after{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--blue) 0%,#7C3AED 50%,var(--green) 100%);
}
.hero-eyebrow{
  font-family:var(--mono);font-size:.68rem;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;color:var(--blue);
  margin-bottom:14px;display:flex;align-items:center;gap:8px;
}
.hero-eyebrow::before{content:'◆';font-size:.5rem}
.hero-verdict{
  font-family:var(--display);font-size:1.55rem;font-weight:600;
  line-height:1.35;color:var(--ink);letter-spacing:-.02em;margin-bottom:16px;
}
.hero-plain{
  font-size:.92rem;line-height:1.75;color:var(--ink2);
  padding:16px 20px;background:var(--bg);border-radius:8px;
  border-left:3px solid var(--blue);margin-bottom:22px;
}
.hero-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.hero-col-label{
  font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  font-family:var(--mono);margin-bottom:10px;
}
.hero-point{
  font-size:.84rem;color:var(--ink2);line-height:1.6;margin-bottom:8px;
  padding-left:14px;border-left:2px solid;
}
.hero-point.for{border-color:var(--green);color:var(--ink2)}
.hero-point.against{border-color:var(--red);color:var(--ink2)}
.hero-bottom{display:flex;align-items:flex-start;gap:24px;flex-wrap:wrap}
.hero-conf-label{font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-family:var(--mono);color:var(--ink3);margin-bottom:8px}
.conf-track{height:8px;background:var(--bg);border-radius:4px;width:160px;overflow:hidden;border:1px solid var(--border)}
.conf-fill{height:100%;border-radius:4px;transition:width .5s}
.conf-num{font-family:var(--display);font-size:1.1rem;font-weight:600;margin-top:5px}
.uncertain-wrap{flex:1}
.uncertain-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.uchip{
  font-size:.76rem;color:var(--blue);padding:4px 10px;
  background:var(--blue-bg);border-radius:20px;line-height:1.4;
}
.changed-note{
  font-size:.82rem;font-style:italic;color:var(--ink2);
  font-family:var(--display);padding:12px 16px;
  background:var(--amber-bg);border-radius:8px;border-left:3px solid var(--amber);
  margin-bottom:20px;
}

/* ── Metrics ── */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
.metric-val{font-family:var(--display);font-size:1.9rem;font-weight:600;line-height:1;letter-spacing:-.03em}
.metric-val.pos{color:var(--green)}
.metric-val.neg{color:var(--red)}
.metric-val.neu{color:var(--blue)}
.metric-lbl{font-size:.72rem;color:var(--ink3);margin-top:5px;font-family:var(--mono)}

/* ── Chart ── */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px 24px;margin-bottom:22px;box-shadow:var(--shadow)}
.chart-title{font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-family:var(--mono);color:var(--ink3);margin-bottom:16px}

/* ── Snapshots ── */
.section-label{font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-family:var(--mono);color:var(--ink3);margin-bottom:12px}
.snap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--shadow);overflow:hidden}
.snap-head{display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;transition:background .1s}
.snap-head:hover{background:var(--bg)}
.snap-head.open{background:var(--bg);border-bottom:1px solid var(--border)}
.snap-round{
  font-family:var(--mono);font-size:.68rem;font-weight:500;
  padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;
}
.snap-conf{flex-shrink:0}
.snap-claim{flex:1;font-size:.87rem;line-height:1.5;color:var(--ink);font-weight:500}
.snap-delta{font-family:var(--mono);font-size:.75rem;font-weight:500;flex-shrink:0;padding:3px 8px;border-radius:20px}
.delta-up{background:var(--green-bg);color:var(--green)}
.delta-down{background:var(--red-bg);color:var(--red)}
.delta-same{background:var(--bg);color:var(--ink3)}
.snap-chevron{color:var(--ink3);font-size:.75rem;flex-shrink:0}
.snap-body{padding:18px 20px}
.snap-what{font-size:.83rem;color:var(--ink2);font-style:italic;font-family:var(--display);padding:10px 14px;background:var(--amber-bg);border-left:3px solid var(--amber);border-radius:0 6px 6px 0;margin-bottom:16px;line-height:1.6}
.ev-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.ev-col-lbl{font-size:.66rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-family:var(--mono);margin-bottom:8px}
.ev-item{font-size:.81rem;color:var(--ink2);line-height:1.55;margin-bottom:6px;padding-left:10px;border-left:2px solid;padding-bottom:2px}
.ev-item.s{border-color:var(--green)}
.ev-item.c{border-color:var(--red)}
.ev-item.o{border-color:var(--blue)}
.sources-row{display:flex;flex-wrap:wrap;gap:6px;padding-top:12px;border-top:1px solid var(--border)}
.src-chip{display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--ink2);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 9px;text-decoration:none;transition:border-color .12s}
.src-chip:hover{border-color:var(--blue);color:var(--blue)}
.src-domain{font-family:var(--mono);font-size:.7rem}

/* ── Q&A ── */
.qa-item{margin-bottom:20px}
.qa-q{border-radius:0 8px 8px 0;padding:14px 18px;margin-bottom:6px;border-left:3px solid}
.qa-type-badge{display:inline-block;font-family:var(--mono);font-size:.65rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:20px;margin-bottom:8px}
.qa-q-text{font-size:.88rem;line-height:1.55;font-weight:500}
.qa-a{border-radius:0 8px 8px 0;padding:14px 18px;margin-left:24px;border-left:3px solid var(--green);background:var(--green-bg)}
.qa-a-conf{font-family:var(--mono);font-size:.7rem;color:var(--ink3);margin-bottom:6px}
.qa-a-text{font-size:.86rem;color:var(--ink2);line-height:1.65;font-family:var(--display);font-style:italic}

/* ── Sources ── */
.src-filter{display:flex;gap:8px;margin-bottom:18px}
.filter-btn{padding:6px 14px;border-radius:20px;font-size:.78rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--ink2);transition:all .12s;font-family:var(--sans)}
.filter-btn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.round-divider{font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-family:var(--mono);color:var(--ink3);padding:6px 0;margin:16px 0 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.source-row{display:flex;gap:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;transition:border-color .12s}
.source-row:hover{border-color:var(--border2)}
.source-row.cited{border-color:var(--blue);background:var(--blue-bg)}
.source-icon{width:32px;height:32px;background:var(--bg);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;border:1px solid var(--border)}
.source-content{flex:1;min-width:0}
.source-title{font-size:.84rem;font-weight:600;color:var(--ink);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.source-meta{font-family:var(--mono);font-size:.68rem;color:var(--ink3);margin-bottom:5px}
.source-snip{font-size:.78rem;color:var(--ink2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cited-badge{font-family:var(--mono);font-size:.62rem;font-weight:600;padding:2px 7px;border-radius:20px;background:var(--blue);color:#fff;flex-shrink:0;align-self:flex-start;margin-top:2px}

/* ── Compare ── */
.compare-check{display:flex;flex-direction:column;gap:4px;margin-bottom:18px}
.check-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;transition:background .1s;border:1px solid transparent}
.check-row:hover{background:var(--bg)}
.check-box{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);background:var(--surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.check-box.on{background:var(--ink);border-color:var(--ink)}
.check-lbl{font-size:.84rem;color:var(--ink)}
.cmp-btn{padding:10px 24px;background:var(--ink);color:#fff;border:none;border-radius:8px;font-family:var(--sans);font-weight:600;font-size:.83rem;cursor:pointer;transition:opacity .15s}
.cmp-btn:hover{opacity:.85}
.cmp-table{width:100%;border-collapse:collapse;font-size:.83rem;margin-top:20px}
.cmp-table th{font-family:var(--mono);font-size:.66rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);text-align:left;padding:8px 12px;border-bottom:2px solid var(--border)}
.cmp-table td{padding:11px 12px;border-bottom:1px solid var(--border);color:var(--ink2);vertical-align:top}
.cmp-table tr:hover td{background:var(--bg)}
.td-mono{font-family:var(--mono);font-weight:500}

/* ── Longitudinal ── */
.long-row{display:flex;gap:20px;padding:16px 0;border-bottom:1px solid var(--border)}
.long-date{font-family:var(--mono);font-size:.72rem;color:var(--ink3);min-width:80px;padding-top:2px}
.long-content{flex:1}
.long-claim{font-size:.88rem;line-height:1.55;color:var(--ink)}
.long-open{font-size:.79rem;color:var(--ink3);margin-top:4px;font-style:italic;font-family:var(--display)}

/* ── Run form ── */
.run-wrap{max-width:500px}
.page-title{font-family:var(--display);font-size:1.6rem;font-weight:600;letter-spacing:-.03em;margin-bottom:6px}
.page-sub{font-size:.88rem;color:var(--ink2);margin-bottom:24px;line-height:1.6}
.form-label{font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-family:var(--mono);color:var(--ink2);display:block;margin-bottom:6px}
.form-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;font-family:var(--sans);font-size:.9rem;color:var(--ink);outline:none;margin-bottom:16px;transition:border-color .15s}
.form-input:focus{border-color:var(--blue)}
.form-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;font-size:.84rem;color:var(--ink2);margin-bottom:22px;user-select:none}
.tog-track{width:38px;height:22px;border-radius:11px;background:var(--border);position:relative;transition:background .2s;flex-shrink:0}
.tog-track.on{background:var(--ink)}
.tog-knob{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:8px;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.tog-track.on .tog-knob{left:19px}
.submit-btn{padding:12px 28px;background:var(--ink);color:#fff;border:none;border-radius:8px;font-family:var(--sans);font-weight:600;font-size:.88rem;cursor:pointer;transition:opacity .15s}
.submit-btn:hover{opacity:.85}
.submit-btn:disabled{opacity:.4;cursor:default}
.job-box{margin-top:16px;padding:14px 16px;border-radius:8px;font-size:.83rem;font-family:var(--mono)}
.job-running{background:var(--amber-bg);border:1px solid #FCD34D;color:var(--amber)}
.job-done{background:var(--green-bg);border:1px solid #86EFAC;color:var(--green)}
.job-error{background:var(--red-bg);border:1px solid #FECACA;color:var(--red)}

/* ── Util ── */
.empty{text-align:center;padding:60px 20px;color:var(--ink3);font-size:.88rem}
.loading{padding:40px;text-align:center;color:var(--ink3);font-family:var(--mono);font-size:.78rem}
.pulse{animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;
const api = p => fetch(p).then(r=>r.json());

// ── helpers ──
const pct = v => Math.round(v*100);
const confColor = v => v>=0.65?'var(--green)':v>=0.4?'var(--amber)':'var(--red)';
const confBg    = v => v>=0.65?'var(--green-bg)':v>=0.4?'var(--amber-bg)':'var(--red-bg)';

const ROUND_COLORS = {
  initial:'#1D4ED8', mechanism:'#0369A1',
  counterexample:'#B45309', evidence:'#15803D', consistency:'#7C3AED'
};
const ROUND_LABELS = {
  initial:'Initial', mechanism:'Mechanism',
  counterexample:'Counterexample', evidence:'Evidence', consistency:'Consistency'
};

function ConfBar({value, width=140}){
  const color = confColor(value);
  return(
    <div style={{display:'flex',alignItems:'center',gap:10}}>
      <div className="conf-track" style={{width}}>
        <div className="conf-fill" style={{width:`${value*100}%`,background:color}}/>
      </div>
      <span style={{fontFamily:'var(--mono)',fontSize:'.78rem',fontWeight:500,color}}>{pct(value)}%</span>
    </div>
  );
}

// ── SVG Chart ──
function Chart({history}){
  const [tip,setTip] = useState(null);
  if(!history?.length) return null;
  const W=600,H=180,PL=40,PR=24,PT=16,PB=32;
  const IW=W-PL-PR, IH=H-PT-PB;
  const xs = history.map((_,i)=>PL+(i/(history.length-1||1))*IW);
  const ys = history.map(h=>PT+(1-h.confidence)*IH);
  const poly = xs.map((x,i)=>`${x},${ys[i]}`).join(' ');
  const grids = [0,.25,.5,.65,.75,1];

  return(
    <div className="chart-card">
      <div className="chart-title">Confidence over time</div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',display:'block'}}>
        {grids.map(v=>{
          const y=PT+(1-v)*IH;
          return <g key={v}>
            <line x1={PL} y1={y} x2={W-PR} y2={y}
              stroke={v===0.65?'#D1FAE5':'#F4F4F5'} strokeWidth={v===0.65?1.5:1}
              strokeDasharray={v===0.65?'4 3':''}/>
            <text x={PL-6} y={y+4} textAnchor="end" fill="var(--ink3)" fontSize="9" fontFamily="var(--mono)">{pct(v)}%</text>
          </g>
        })}
        <defs>
          <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="var(--blue)" stopOpacity=".15"/>
            <stop offset="100%" stopColor="var(--blue)" stopOpacity="0"/>
          </linearGradient>
        </defs>
        <polygon points={`${PL},${PT+IH} ${poly} ${W-PR},${PT+IH}`} fill="url(#lineGrad)"/>
        <polyline points={poly} fill="none" stroke="var(--blue)" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
        {history.map((h,i)=>{
          const x=xs[i],y=ys[i];
          const q = ROUND_LABELS[i===0?'initial':['mechanism','counterexample','evidence','consistency'][i-1]]||'';
          return <g key={i} style={{cursor:'pointer'}}
            onMouseEnter={()=>setTip({i,x,y,h,q})}
            onMouseLeave={()=>setTip(null)}>
            <circle cx={x} cy={y} r="12" fill="transparent"/>
            <circle cx={x} cy={y} r="5" fill={confColor(h.confidence)} stroke="white" strokeWidth="2"/>
            <text x={x} y={H-8} textAnchor="middle" fill="var(--ink3)" fontSize="8.5" fontFamily="var(--mono)">
              {i===0?'Start':q.slice(0,4)}
            </text>
          </g>
        })}
        {tip&&(()=>{
          const {x,y,h,q} = tip;
          const tx=Math.min(x-4, W-PR-130);
          const ty=y<PT+50?y+12:y-44;
          return <g>
            <rect x={tx} y={ty} width={132} height={38} rx="5" fill="white" stroke="var(--border)" strokeWidth="1" filter="drop-shadow(0 2px 4px rgba(0,0,0,.08))"/>
            <text x={tx+10} y={ty+15} fill={confColor(h.confidence)} fontSize="11" fontFamily="var(--mono)" fontWeight="600">{pct(h.confidence)}% confidence</text>
            <text x={tx+10} y={ty+29} fill="var(--ink2)" fontSize="9" fontFamily="var(--sans)">{q||'Initial belief'}</text>
          </g>
        })()}
      </svg>
    </div>
  );
}

// ── Final View ──
function FinalView({runId}){
  const [fv,setFv]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    if(!runId)return;
    setLoading(true);
    api(`/api/final_view?run_id=${runId}`).then(d=>{setFv(d);setLoading(false)});
  },[runId]);
  if(loading) return <div className="hero"><div className="loading pulse">Generating summary…</div></div>;
  if(!fv) return null;
  const c=fv.confidence;
  return(
    <div className="hero fade-in">
      <div className="hero-eyebrow">Thread's conclusion</div>
      <div className="hero-verdict">{fv.verdict}</div>
      <div className="hero-plain">{fv.plain_english}</div>
      {fv.what_changed&&<div className="changed-note">What shifted: {fv.what_changed}</div>}
      <div className="hero-cols">
        <div>
          <div className="hero-col-label" style={{color:'var(--green)'}}>Evidence supports this</div>
          {fv.strongest_for?.map((a,i)=><div key={i} className="hero-point for">{a}</div>)}
        </div>
        <div>
          <div className="hero-col-label" style={{color:'var(--red)'}}>Evidence pushes back</div>
          {fv.strongest_against?.map((a,i)=><div key={i} className="hero-point against">{a}</div>)}
        </div>
      </div>
      <div className="hero-bottom">
        <div>
          <div className="hero-conf-label">How confident</div>
          <ConfBar value={c} width={140}/>
          <div className="conf-num" style={{color:confColor(c)}}>{pct(c)}%</div>
        </div>
        {fv.still_uncertain?.length>0&&(
          <div className="uncertain-wrap">
            <div className="hero-conf-label">Still open questions</div>
            <div className="uncertain-chips">
              {fv.still_uncertain.map((q,i)=><span key={i} className="uchip">{q}</span>)}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Snapshot ──
function Snap({h,interrogation,articleMap,defaultOpen}){
  const [open,setOpen]=useState(defaultOpen||false);
  const i=h.iteration;
  const label=i===0?'Starting belief':`Round ${i}`;
  const qtype=interrogation?.question_type||'initial';
  const tcolor=ROUND_COLORS[qtype]||'var(--ink3)';
  const cited=(h.cited_article_ids||[]).map(id=>articleMap[id]).filter(Boolean);

  let delta=null,deltaEl=null;
  // delta shown by interrogation answer
  if(interrogation?.delta!==undefined){
    const d=interrogation.delta;
    if(d>0.01) deltaEl=<span className="snap-delta delta-up">↑ +{pct(Math.abs(d))}%</span>;
    else if(d<-0.01) deltaEl=<span className="snap-delta delta-down">↓ -{pct(Math.abs(d))}%</span>;
    else deltaEl=<span className="snap-delta delta-same">unchanged</span>;
  }

  return(
    <div className="snap">
      <div className={`snap-head${open?' open':''}`} onClick={()=>setOpen(o=>!o)}>
        <span className="snap-round" style={{background:tcolor+'18',color:tcolor,border:`1px solid ${tcolor}33`}}>
          {ROUND_LABELS[qtype]||label}
        </span>
        <ConfBar value={h.confidence} width={90}/>
        {deltaEl}
        <span className="snap-claim">{h.core_claim}</span>
        <span className="snap-chevron">{open?'▲':'▼'}</span>
      </div>
      {open&&(
        <div className="snap-body fade-in">
          {interrogation?.answer&&(
            <div className="snap-what">{interrogation.answer}</div>
          )}
          <div className="ev-grid">
            <div>
              <div className="ev-col-lbl" style={{color:'var(--green)'}}>Supports</div>
              {h.supporting_evidence?.map((e,i)=><div key={i} className="ev-item s">{e}</div>)}
            </div>
            <div>
              <div className="ev-col-lbl" style={{color:'var(--red)'}}>Contradicts</div>
              {h.contradicting_evidence?.map((e,i)=><div key={i} className="ev-item c">{e}</div>)}
            </div>
            <div>
              <div className="ev-col-lbl" style={{color:'var(--blue)'}}>Open questions</div>
              {h.open_questions?.map((q,i)=><div key={i} className="ev-item o">{q}</div>)}
            </div>
          </div>
          {cited.length>0&&(
            <div className="sources-row">
              <span style={{fontSize:'.68rem',color:'var(--ink3)',fontFamily:'var(--mono)',marginRight:4}}>Sources used:</span>
              {cited.map(a=>(
                <a key={a.id} className="src-chip" href={a.url} target="_blank" rel="noreferrer">
                  <span className="src-domain">{a.source}</span>
                </a>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── TRAJECTORY VIEW ──
function TrajectoryView({runId}){
  const [history,setHistory]=useState(null);
  const [qs,setQs]=useState([]);
  const [articles,setArticles]=useState([]);

  useEffect(()=>{
    if(!runId)return;
    api(`/api/history?run_id=${runId}`).then(setHistory);
    api(`/api/interrogations?run_id=${runId}`).then(setQs);
    api(`/api/articles?run_id=${runId}`).then(setArticles);
  },[runId]);

  if(!runId) return <div className="empty">Select a topic and run from the sidebar</div>;
  if(!history) return <div className="loading pulse">Loading…</div>;

  const qMap={};qs.forEach(q=>{qMap[q.iteration]=q});
  const aMap={};articles.forEach(a=>{aMap[a.id]=a});

  const h0=history[0],hL=history[history.length-1];
  const delta=hL?hL.confidence-h0.confidence:0;

  // inject delta into qMap for display
  history.forEach((h,i)=>{
    if(i>0&&qMap[h.iteration]){
      qMap[h.iteration].delta = h.confidence-history[i-1].confidence;
    }
  });

  return(
    <div className="fade-in">
      <FinalView runId={runId}/>
      <div className="metrics">
        <div className="metric">
          <div className="metric-val">{pct(h0.confidence)}%</div>
          <div className="metric-lbl">Started at</div>
        </div>
        <div className="metric">
          <div className={`metric-val ${delta>=0?'pos':'neg'}`}>{pct(hL.confidence)}%</div>
          <div className="metric-lbl">Ended at · {delta>=0?'+':''}{pct(delta)}%</div>
        </div>
        <div className="metric">
          <div className="metric-val neu">{articles.length}</div>
          <div className="metric-lbl">Sources read</div>
        </div>
        <div className="metric">
          <div className="metric-val">{qs.length-1}</div>
          <div className="metric-lbl">Rounds of questioning</div>
        </div>
      </div>
      <Chart history={history}/>
      <div className="section-label">How the belief evolved — click any round to expand</div>
      {history.map((h,i)=>(
        <Snap key={i} h={h} interrogation={qMap[h.iteration]} articleMap={aMap} defaultOpen={i===0}/>
      ))}
    </div>
  );
}

// ── Q&A VIEW ──
function QAView({runId}){
  const [qs,setQs]=useState(null);
  const [history,setHistory]=useState([]);
  useEffect(()=>{
    if(!runId)return;
    api(`/api/interrogations?run_id=${runId}`).then(setQs);
    api(`/api/history?run_id=${runId}`).then(setHistory);
  },[runId]);
  if(!runId) return <div className="empty">Select a run</div>;
  if(!qs) return <div className="loading pulse">Loading…</div>;
  const hMap={};history.forEach(h=>{hMap[h.iteration]=h});
  return(
    <div className="fade-in">
      <div className="page-title">How it questioned itself</div>
      <div className="page-sub">Every challenge asked and how the belief responded</div>
      {qs.map((q,i)=>{
        const h=hMap[q.iteration];
        const tc=ROUND_COLORS[q.question_type]||'#64748B';
        return(
          <div key={i} className="qa-item">
            <div className="qa-q" style={{background:tc+'0d',borderColor:tc}}>
              <div className="qa-type-badge" style={{background:tc+'18',color:tc}}>{(q.question_type||'initial').toUpperCase()}</div>
              <div className="qa-q-text">{q.question}</div>
            </div>
            {q.answer&&(
              <div className="qa-a">
                {h&&<div className="qa-a-conf">Confidence after this round: <span style={{color:confColor(h.confidence),fontWeight:600}}>{pct(h.confidence)}%</span></div>}
                <div className="qa-a-text">{q.answer}</div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── SOURCES VIEW ──
function SourcesView({runId}){
  const [articles,setArticles]=useState(null);
  const [history,setHistory]=useState([]);
  const [filter,setFilter]=useState('all');
  useEffect(()=>{
    if(!runId)return;
    api(`/api/articles?run_id=${runId}`).then(setArticles);
    api(`/api/history?run_id=${runId}`).then(setHistory);
  },[runId]);
  if(!runId) return <div className="empty">Select a run</div>;
  if(!articles) return <div className="loading pulse">Loading…</div>;
  const citedIds=new Set(history.flatMap(h=>h.cited_article_ids||[]));
  const roundOrder=['initial','mechanism','counterexample','evidence','consistency'];
  const groups={};articles.forEach(a=>{const k=a.round_type||'initial';(groups[k]=groups[k]||[]).push(a)});
  const filters=[{k:'all',l:`All (${articles.length})`},{k:'cited',l:`Cited (${citedIds.size})`}];
  return(
    <div className="fade-in">
      <div className="page-title">Sources</div>
      <div className="page-sub">Every article read during the investigation</div>
      <div className="src-filter">
        {filters.map(f=><button key={f.k} className={`filter-btn${filter===f.k?' on':''}`} onClick={()=>setFilter(f.k)}>{f.l}</button>)}
      </div>
      {roundOrder.map(rt=>{
        let arts=groups[rt]||[];
        if(filter==='cited') arts=arts.filter(a=>citedIds.has(a.id));
        if(!arts.length) return null;
        const tc=ROUND_COLORS[rt]||'var(--ink3)';
        return(
          <div key={rt}>
            <div className="round-divider">
              <span style={{color:tc}}>{ROUND_LABELS[rt]||rt}</span>
              <span>{arts.length} source{arts.length!==1?'s':''}</span>
            </div>
            {arts.map(a=>(
              <div key={a.id} className={`source-row${citedIds.has(a.id)?' cited':''}`}>
                <div className="source-icon">📄</div>
                <div className="source-content">
                  <div className="source-title">{a.title||'(no title)'}</div>
                  <div className="source-meta">{a.source}{a.published?` · ${a.published.slice(0,10)}`:''}</div>
                  {a.snippet&&<div className="source-snip">{a.snippet}</div>}
                  {a.url&&<a href={a.url} target="_blank" rel="noreferrer" style={{fontSize:'.7rem',color:'var(--blue)',fontFamily:'var(--mono)',display:'inline-block',marginTop:4}}>↗ {a.url.slice(0,55)}</a>}
                </div>
                {citedIds.has(a.id)&&<span className="cited-badge">cited</span>}
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// ── COMPARE VIEW ──
function CompareView({topics}){
  const [sel,setSel]=useState([]);
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(false);
  const PALETTE=['#1D4ED8','#15803D','#B45309','#B91C1C','#7C3AED','#0369A1'];
  const toggle=t=>setSel(s=>s.includes(t)?s.filter(x=>x!==t):[...s,t]);
  const load=async()=>{
    if(sel.length<2)return;
    setLoading(true);
    const d=await api(`/api/compare?topics=${sel.map(encodeURIComponent).join('||')}`);
    setData(d);setLoading(false);
  };
  if(!topics.length) return <div className="empty">No topics yet</div>;

  const W=600,H=160,PL=36,PR=20,PT=12,PB=28;
  const IW=W-PL-PR,IH=H-PT-PB;

  return(
    <div className="fade-in">
      <div className="page-title">Compare topics</div>
      <div className="page-sub">See how different topics converge differently</div>
      <div className="compare-check">
        {topics.map(t=>(
          <div key={t} className="check-row" onClick={()=>toggle(t)}>
            <div className={`check-box${sel.includes(t)?' on':''}`}>{sel.includes(t)&&<span style={{color:'#fff',fontSize:'.65rem',fontWeight:700}}>✓</span>}</div>
            <span className="check-lbl">{t}</span>
          </div>
        ))}
      </div>
      {sel.length>=2&&!data&&<button className="cmp-btn" onClick={load} disabled={loading}>{loading?'Loading…':'Compare'}</button>}
      {data&&(()=>{
        const entries=Object.entries(data);
        const maxI=Math.max(...entries.map(([,v])=>v.history.length-1),1);
        return <>
          <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r)',display:'block',marginBottom:16}}>
            {[0,.5,1].map(v=><line key={v} x1={PL} y1={PT+(1-v)*IH} x2={W-PR} y2={PT+(1-v)*IH} stroke="var(--border)" strokeWidth="1"/>)}
            {entries.map(([topic,{history}],ti)=>{
              const color=PALETTE[ti%PALETTE.length];
              const xs=history.map((_,i)=>PL+(i/maxI)*IW);
              const ys=history.map(h=>PT+(1-h.confidence)*IH);
              return <g key={topic}>
                <polyline points={xs.map((x,i)=>`${x},${ys[i]}`).join(' ')} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round"/>
                {history.map((h,i)=><circle key={i} cx={xs[i]} cy={ys[i]} r="4" fill={color} stroke="white" strokeWidth="1.5"/>)}
              </g>
            })}
            {[0,.5,1].map(v=><text key={v} x={PL-4} y={PT+(1-v)*IH+4} textAnchor="end" fill="var(--ink3)" fontSize="9" fontFamily="var(--mono)">{pct(v)}%</text>)}
          </svg>
          <div style={{display:'flex',flexWrap:'wrap',gap:12,marginBottom:16}}>
            {entries.map(([t],i)=><div key={t} style={{display:'flex',alignItems:'center',gap:6,fontSize:'.78rem',color:'var(--ink2)'}}>
              <div style={{width:10,height:10,borderRadius:'50%',background:PALETTE[i%PALETTE.length]}}/>
              {t}
            </div>)}
          </div>
          <table className="cmp-table">
            <thead><tr><th>Topic</th><th>Start</th><th>End</th><th>Change</th><th>Final belief</th></tr></thead>
            <tbody>{entries.map(([topic,{history}],i)=>{
              const s=history[0]?.confidence,e=history[history.length-1]?.confidence,d=e-s;
              return <tr key={topic}>
                <td style={{color:PALETTE[i%PALETTE.length],fontWeight:600}}>{topic}</td>
                <td className="td-mono">{pct(s)}%</td>
                <td className="td-mono">{pct(e)}%</td>
                <td className="td-mono" style={{color:d>=0?'var(--green)':'var(--red)'}}>{d>=0?'+':''}{pct(d)}%</td>
                <td style={{fontSize:'.79rem',color:'var(--ink2)',maxWidth:240}}>{history[history.length-1]?.core_claim?.slice(0,100)}…</td>
              </tr>
            })}</tbody>
          </table>
        </>
      })()}
    </div>
  );
}

// ── LONGITUDINAL VIEW ──
function LongitudinalView({topic}){
  const [data,setData]=useState(null);
  useEffect(()=>{if(!topic)return;api(`/api/longitudinal?topic=${encodeURIComponent(topic)}`).then(setData)},[topic]);
  if(!topic) return <div className="empty">Select a topic</div>;
  if(!data) return <div className="loading pulse">Loading…</div>;
  if(data.length<2) return(
    <div className="fade-in">
      <div className="page-title">Belief over time</div>
      <div className="page-sub">Only {data.length} run so far. Run the same topic again on another day to see how beliefs shift.</div>
      {data[0]&&<div className="card"><ConfBar value={data[0].confidence}/><div style={{marginTop:10,fontSize:'.88rem'}}>{data[0].core_claim}</div></div>}
    </div>
  );
  return(
    <div className="fade-in">
      <div className="page-title">Belief over time</div>
      <div className="page-sub">How understanding of "{topic}" changed across multiple runs</div>
      {data.map((d,i)=>(
        <div key={d.run_id} className="long-row">
          <div className="long-date">{d.started_at?.slice(0,10)}</div>
          <div className="long-content">
            <ConfBar value={d.confidence} width={100}/>
            <div className="long-claim" style={{marginTop:8}}>{d.core_claim}</div>
            {d.open_questions?.[0]&&<div className="long-open">Still open: {d.open_questions[0]}</div>}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── RUN VIEW ──
function RunView({onDone}){
  const [topic,setTopic]=useState('');
  const [useSearch,setUseSearch]=useState(true);
  const [jobId,setJobId]=useState(null);
  const [status,setStatus]=useState(null);
  const poll=useRef(null);
  const start=async()=>{
    if(!topic.trim())return;
    const r=await fetch('/api/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic:topic.trim(),use_search:useSearch})}).then(r=>r.json());
    setJobId(r.job_id);setStatus({status:'running'});
  };
  useEffect(()=>{
    if(!jobId)return;
    poll.current=setInterval(async()=>{
      const s=await api(`/api/job/${jobId}`);
      setStatus(s);
      if(s.status==='done'||s.status==='error'){clearInterval(poll.current);if(s.status==='done'&&onDone)onDone();}
    },2000);
    return()=>clearInterval(poll.current);
  },[jobId]);
  return(
    <div className="run-wrap fade-in">
      <div className="page-title">New topic</div>
      <div className="page-sub">Thread will search the web, form an initial belief, question it from four angles, and produce a final verdict.</div>
      <label className="form-label">What do you want to understand?</label>
      <input className="form-input" value={topic} onChange={e=>setTopic(e.target.value)} placeholder="e.g. why do democracies fail" onKeyDown={e=>e.key==='Enter'&&start()}/>
      <div className="form-toggle" onClick={()=>setUseSearch(s=>!s)}>
        <div className={`tog-track${useSearch?' on':''}`}><div className="tog-knob"/></div>
        Search the web for real sources
      </div>
      <button className="submit-btn" onClick={start} disabled={!topic.trim()||status?.status==='running'}>
        {status?.status==='running'?'Running…':'Start →'}
      </button>
      {status&&(
        <div className={`job-box job-${status.status}`}>
          {status.status==='running'&&'⏳  Searching, reasoning, questioning…'}
          {status.status==='done'&&`✓  Done — view it in the sidebar`}
          {status.status==='error'&&`✗  ${status.error}`}
        </div>
      )}
    </div>
  );
}

// ── NAV CONFIG ──
const NAV=[
  {id:'trajectory', icon:'◎', label:'Summary'},
  {id:'qa',         icon:'↔', label:'How it questioned itself'},
  {id:'sources',    icon:'⊞', label:'Sources read'},
  {id:'compare',    icon:'⊜', label:'Compare topics'},
  {id:'longitudinal',icon:'↷',label:'Belief over time'},
];

// ── APP ──
function App(){
  const [topics,setTopics]=useState([]);
  const [topic,setTopic]=useState('');
  const [runs,setRuns]=useState([]);
  const [runId,setRunId]=useState('');
  const [view,setView]=useState('trajectory');

  const loadTopics=useCallback(async()=>{
    const t=await api('/api/topics');
    setTopics(t);
    if(t.length&&!topic)setTopic(t[0]);
  },[]);

  useEffect(()=>{loadTopics()},[]);
  useEffect(()=>{
    if(!topic)return;
    api(`/api/runs?topic=${encodeURIComponent(topic)}`).then(r=>{
      setRuns(r);
      if(r.length)setRunId(r[r.length-1].run_id);
    });
  },[topic]);

  const curRun=runs.find(r=>r.run_id===runId);

  return(
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-top">
          <div className="brand">
            <div className="brand-mark">T</div>
            <div className="brand-name">Thread</div>
          </div>
          <div className="field-group">
            <div className="field-label">Topic</div>
            <select className="sidebar-select" value={topic} onChange={e=>setTopic(e.target.value)}>
              {topics.map(t=><option key={t} value={t}>{t}</option>)}
              {!topics.length&&<option>No topics yet</option>}
            </select>
          </div>
          {runs.length>0&&(
            <div className="field-group">
              <div className="field-label">Run</div>
              <select className="sidebar-select" value={runId} onChange={e=>setRunId(e.target.value)}>
                {runs.map((r,i)=><option key={r.run_id} value={r.run_id}>Run {i+1} · {r.started_at?.slice(0,10)}</option>)}
              </select>
            </div>
          )}
        </div>
        <nav className="nav">
          {NAV.map(n=>(
            <div key={n.id} className={`nav-item${view===n.id?' active':''}`} onClick={()=>setView(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              {n.label}
            </div>
          ))}
        </nav>
        <button className="new-btn" onClick={()=>setView('run')}>+ New topic</button>
      </aside>

      <div className="main">
        <div className="topbar">
          {topic&&<span className="topbar-topic">{topic}</span>}
          {curRun&&<span className="topbar-chip">{curRun.started_at?.slice(0,10)}</span>}
          {runId&&<span className="topbar-chip">Run {runs.indexOf(curRun)+1} of {runs.length}</span>}
        </div>
        <div className="content">
          {view==='trajectory'  &&<TrajectoryView  runId={runId}/>}
          {view==='qa'          &&<QAView          runId={runId}/>}
          {view==='sources'     &&<SourcesView     runId={runId}/>}
          {view==='compare'     &&<CompareView     topics={topics}/>}
          {view==='longitudinal'&&<LongitudinalView topic={topic}/>}
          {view==='run'         &&<RunView onDone={()=>{loadTopics();setView('trajectory')}}/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
